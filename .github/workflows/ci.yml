name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore EldritchDungeon.sln

      - name: Build
        run: dotnet build EldritchDungeon.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test EldritchDungeon.sln --configuration Release --no-build --verbosity normal
